<!-- FORMULARIO ZONA -->
<form id="formZona">
    <input type="text" id="zonaNombre" required>
    <textarea id="zonaDescripcion"></textarea>
</form>

<!-- FORMULARIO DISTRITO -->
<form id="formDistrito">
    <select id="distritoZona" required></select>
    <input type="text" id="distritoNombre" required>
    <input type="text" id="distritoResponsable">
    <input type="text" id="distritoTelefono">
</form>

<!-- FORMULARIO IGLESIA -->
<form id="formIglesia">
    <select id="iglesiaZona" required></select>
    <select id="iglesiaDistrito"></select>
    <input type="text" id="iglesiaNombre" required>
    <input type="text" id="iglesiaPastor">
    <input type="text" id="iglesiaDireccion">
    <input type="text" id="iglesiaTelefono">
</form>

<!-- FORMULARIO CONFERENCIA -->
<form id="formConferencia">
    <input type="text" id="confNombre" required>
    <select id="confIglesia" required></select>
    <input type="date" id="confFechaInicio" required>
    <input type="date" id="confFechaFin" required>
    <input type="text" id="confConferenciante">
</form>

<!-- FORMULARIO ASISTENTE -->
<form id="formAsistente">
    <input type="text" id="asistNombre" required>
    <input type="text" id="asistTelefono">
    <input type="text" id="asistDireccion">
    <input type="text" id="asistInvitadoPor">
    <select id="asistIglesia"></select>
    <select id="asistConferencia" required></select>
    <div id="fechasAsistenciaContainer"></div>
    <input type="hidden" id="diasAsistidosInput">
</form>

<!-- FORMULARIO USUARIO -->
<form id="formUsuario">
    <input type="text" id="usuarioNombreCompleto" required>
    <input type="email" id="usuarioEmail" required>
    <input type="password" id="usuarioPassword">
    <select id="usuarioRol"></select>
    <input type="checkbox" id="usuarioEstado">
</form>

<!-- TABLAS -->
<table id="tablaZonas"></table>
<table id="tablaDistritos"></table>
<table id="tablaIglesias"></table>
<table id="tablaConferencias"></table>
<table id="tablaAsistentes"></table>
<table id="tablaUsuarios"></table>

<!-- ESTADÍSTICAS -->
<div id="statZonas"></div>
<div id="statDistritos"></div>
<div id="statIglesias"></div>
<div id="statConferencias"></div>
<div id="statAsistentes"></div>

<!-- MODALES -->
<div id="modalNuevaZona"></div>
<div id="modalNuevoDistrito"></div>
<div id="modalNuevaIglesia"></div>
<div id="modalNuevaConferencia"></div>
<div id="modalNuevoAsistente"></div>
<div id="modalNuevoUsuario"></div>
