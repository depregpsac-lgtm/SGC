<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MinistryLion</title>
    <!-- Supabase JS Library - CRÍTICO: Cargar antes de config.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #1e3a8a;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #9ca3af;
            font-size: 12px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🦁 MinistryLion</h1>
            <p>Sistema de Control de Conferencias</p>
        </div>
        
        <div id="dbError" class="error-message">
            ⚠️ No se puede conectar con la base de datos. Verifica tu conexión a internet.
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">📧 Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@correo.com">
            </div>
            
            <div class="form-group">
                <label for="password">🔑 Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="footer">
            Sistema de Gestión de Conferencias © 2026
        </div>
    </div>

    <!-- ORDEN CRÍTICO: config.js → app.js → main.js -->
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="main.js"></script>
    <script>
        // Verificar conexión con la base de datos al cargar
        document.addEventListener('DOMContentLoaded', async () => {
            const dbError = document.getElementById('dbError');
            const loginBtn = document.getElementById('loginBtn');
            
            // Esperar a que config.js inicialice Supabase
            await new Promise(resolve => setTimeout(resolve, 500));
            
            if (!window.db) {
                dbError.classList.add('show');
                loginBtn.disabled = true;
                console.error('❌ No se pudo inicializar la conexión a Supabase');
            } else {
                dbError.classList.remove('show');
                loginBtn.disabled = false;
                console.log('✅ Conexión a Supabase establecida');
            }
            
            // Manejar el formulario de login
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                
                if (!window.db) {
                    mostrarMensaje('❌ Error: No hay conexión con la base de datos', 'error');
                    return;
                }
                
                loginBtn.disabled = true;
                loginBtn.textContent = '⏳ Verificando...';
                
                try {
                    const result = await login(email, password);
                    
                    if (result.success) {
                        mostrarMensaje('✅ Inicio de sesión exitoso', 'success');
                        setTimeout(() => {
                            window.location.href = 'control-conferencias.html';
                        }, 1000);
                    } else {
                        mostrarMensaje(result.error, 'error');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Iniciar Sesión';
                    }
                } catch (error) {
                    mostrarMensaje('❌ Error: ' + error.message, 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Iniciar Sesión';
                }
            });
        });
    </script>
</body>
</html>
