<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MinistryLion</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #1e3a5f; font-size: 1.8rem; }
        .logo p { color: #666; margin-top: 0.5rem; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { 
            display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; 
        }
        .form-group input { 
            width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; 
            border-radius: 8px; font-size: 1rem; transition: border-color 0.3s;
        }
        .form-group input:focus { 
            outline: none; border-color: #1e3a5f; 
        }
        
        .btn-login { 
            width: 100%; padding: 0.85rem; background: #1e3a5f; color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.3s; margin-top: 0.5rem;
        }
        .btn-login:hover { background: #2d5a87; }
        .btn-login:disabled { background: #95a5a6; cursor: not-allowed; }
        
        .error-message {
            background: #fee2e2; color: #dc2626; padding: 0.75rem;
            border-radius: 8px; margin-bottom: 1rem; display: none;
        }
        .error-message.show { display: block; }
        
        .loading { text-align: center; color: #666; display: none; }
        .loading.show { display: block; }
        
        .footer { text-align: center; margin-top: 2rem; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🦁 MinistryLion</h1>
            <p>Sistema de Gestión de Conferencia</p>
            
        </div>
        
        <div id="dbError" class="error-message">
            ⚠️ No se puede conectar con la base de datos. Verifica tu conexión.
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">📧 Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">🔑 Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <div id="loading" class="loading">🔄 Iniciando sesión...</div>
            
            <button type="submit" id="btnLogin" class="btn-login">Iniciar Sesión</button>
        </form>
    </div>
    
    <div class="footer">
        <p>Sistema de Gestión de Conferencias © 2026</p>
    </div>

    <!-- Scripts en orden correcto -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        // ============================================
        // LÓGICA DE LOGIN - index.html
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🔐 index.html cargado');
            
            // Esperar a que Supabase esté inicializado
            if (!window.db) {
                await new Promise(resolve => {
                    const check = setInterval(() => {
                        if (window.db) {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                    // Timeout de 3 segundos
                    setTimeout(() => {
                        clearInterval(check);
                        resolve();
                    }, 3000);
                });
            }
            
            // Si ya hay usuario autenticado, redirigir al dashboard
            const user = localStorage.getItem('user');
            if (user && window.db) {
                try {
                    // Verificar que la sesión sea válida
                    const userData = JSON.parse(user);
                    window.location.href = 'control-conferencias.html';
                    return;
                } catch (e) {
                    localStorage.removeItem('user');
                }
            }
            
            // Manejar formulario de login
            const form = document.getElementById('loginForm');
            const btnLogin = document.getElementById('btnLogin');
            const loading = document.getElementById('loading');
            const dbError = document.getElementById('dbError');
            
            // Mostrar error si no hay conexión a Supabase
            if (!window.db) {
                dbError.classList.add('show');
                btnLogin.disabled = true;
                return;
            }
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                // UI: Estado de carga
                btnLogin.disabled = true;
                loading.classList.add('show');
                dbError.classList.remove('show');
                
                try {
                    const result = await login(email, password);
                    
                    if (result.success) {
                        // ✅ Login exitoso - redirigir
                        window.location.href = 'control-conferencias.html';
                    } else {
                        // ❌ Error de credenciales
                        dbError.textContent = '❌ ' + result.error;
                        dbError.classList.add('show');
                        btnLogin.disabled = false;
                        loading.classList.remove('show');
                    }
                } catch (error) {
                    console.error('❌ Error en login:', error);
                    dbError.textContent = '❌ Error de conexión: ' + error.message;
                    dbError.classList.add('show');
                    btnLogin.disabled = false;
                    loading.classList.remove('show');
                }
            });
            
            console.log('✅ index.html inicializado');
        });
    </script>
</body>
</html>
