<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MinistryLion</title>
    <!-- ✅ Supabase CDN - DEBE CARGAR PRIMERO -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            color: #333;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 60px;
            color: #667eea;
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-size: 32px;
        }

        .login-box p {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .input-icon input {
            padding-left: 45px;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .login-alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .login-alert.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .login-alert.success {
            background: #d1fae5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #888;
        }

        .status-indicator {
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .status-indicator i {
            margin-right: 5px;
        }

        .status-indicator.connected {
            color: #059669;
        }

        .status-indicator.disconnected {
            color: #dc2626;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-crown"></i>
        </div>
        <h1>MinistryLion</h1>
        <p>Sistema de Control de Conferencias</p>
        
        <!-- ✅ Indicador de Estado de Conexión -->
        <div id="connectionStatus" class="status-indicator">
            <i class="fas fa-circle-notch fa-spin"></i> Conectando con Supabase...
        </div>
        
        <!-- ✅ Alerta de Login -->
        <div id="loginAlert" class="login-alert"></div>
        
        <!-- ✅ Formulario de Login -->
        <form id="loginForm">
            <div class="form-group input-icon">
                <label>📧 Correo Electrónico</label>
                <input type="email" id="loginEmail" required placeholder="admin@ministrylion.com">
            </div>
            
            <div class="form-group input-icon">
                <label>🔑 Contraseña</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin" disabled>
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>
        
        <div class="footer">
            Sistema de Gestión de Conferencias © 2026<br>
            Elaborado por: Natanael León Veras
        </div>
    </div>

    <!-- ✅ Scripts en Orden Correcto -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    
    <script>
        // ✅ Inicializar Login cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🔍 Iniciando página de login...');
            
            // Esperar a que Supabase se inicialice
            await new Promise(resolve => setTimeout(resolve, 500));
            
            const statusDiv = document.getElementById('connectionStatus');
            const btnLogin = document.getElementById('btnLogin');
            
            // Verificar conexión con Supabase
            if (window.db) {
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Conectado a Supabase';
                statusDiv.className = 'status-indicator connected';
                btnLogin.disabled = false;
                console.log('✅ Supabase conectado correctamente');
            } else {
                statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ❌ Error de conexión';
                statusDiv.className = 'status-indicator disconnected';
                btnLogin.disabled = true;
                console.error('❌ Supabase no se pudo conectar');
                mostrarAlerta('Error de conexión con la base de datos. Recarga la página.', 'error');
            }
            
            // Configurar formulario de login
            configurarLogin();
        });
        
        function configurarLogin() {
            const loginForm = document.getElementById('loginForm');
            const btnLogin = document.getElementById('btnLogin');
            
            if (!loginForm) {
                console.error('❌ No se encontró el formulario de login');
                return;
            }
            
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                if (!email || !password) {
                    mostrarAlerta('❌ Complete todos los campos', 'error');
                    return;
                }
                
                // Mostrar estado de carga
                const originalText = btnLogin.innerHTML;
                btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Iniciando sesión...';
                btnLogin.disabled = true;
                
                try {
                    console.log('🔐 Intentando login con:', email);
                    
                    // ✅ LLAMAR FUNCIÓN DE AUTH.JS
                    const resultado = await iniciarSesion(email, password);
                    
                    if (resultado.success) {
                        mostrarAlerta('✅ Inicio de sesión exitoso. Redirigiendo...', 'success');
                        
                        setTimeout(() => {
                            // ✅ REDIRIGIR AL DASHBOARD
                            window.location.href = 'control-conferencias (4).html';
                        }, 1500);
                    } else {
                        mostrarAlerta(resultado.message || '❌ Credenciales incorrectas', 'error');
                        btnLogin.innerHTML = originalText;
                        btnLogin.disabled = false;
                    }
                } catch (error) {
                    console.error('❌ Error en login:', error);
                    mostrarAlerta('❌ Error de conexión: ' + error.message, 'error');
                    btnLogin.innerHTML = originalText;
                    btnLogin.disabled = false;
                }
            });
        }
        
        function mostrarAlerta(mensaje, tipo) {
            const alertDiv = document.getElementById('loginAlert');
            if (alertDiv) {
                alertDiv.textContent = mensaje;
                alertDiv.className = 'login-alert ' + tipo;
                alertDiv.style.display = 'block';
                
                if (tipo === 'success') {
                    setTimeout(() => {
                        alertDiv.style.display = 'none';
                    }, 2000);
                }
            }
        }
    </script>
</body>
</html>
